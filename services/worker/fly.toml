# Fly.io config for the Lead Machine worker.
#
# The worker is not a web service — it runs CLI pipeline commands. We keep a
# tiny always-on machine you can `fly ssh console` / `fly machine exec` into,
# and drive scheduled runs from it (see docs/DEPLOY.md).
#
# Set secrets (never commit them):
#   fly secrets set SUPABASE_URL=... SUPABASE_SERVICE_ROLE_KEY=... \
#                   CVR_ES_USER=... CVR_ES_PASSWORD=... \
#                   ANTHROPIC_API_KEY=... PAGESPEED_API_KEY=... \
#                   BRAVE_API_KEY=... \
#                   ROBINSON_LIST_PATH=/data/robinson.txt

app = "lead-machine-worker"
primary_region = "arn"  # Stockholm — keep data in the EU (eu-north-1 Supabase)

[build]
  dockerfile = "Dockerfile"

# No [http_service]: this app exposes no port. The machine is on-demand — it
# stays stopped (≈$0) and the web app starts it on enrich opt-in.
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# On start, drain the whole enrichment queue then run the compliance screen and
# exit. `sh -c` so both commands run; the image has no ENTRYPOINT so this string
# is the full command.
[processes]
  app = "sh -c 'leadmachine enrich-queued --drain && leadmachine screen'"

# One-shot: when the drain command exits, stop and stay stopped (don't restart-
# loop the job). The web app / daily backstop re-starts the machine on demand.
[[restart]]
  policy = "never"
  processes = ["app"]

# Optional: a persistent volume to hold the Robinson list + any local state.
# Create it once:  fly volumes create lm_data --size 1 --region arn
[mounts]
  source = "lm_data"
  destination = "/data"
